<nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md shadow-lg z-50 transition-all duration-300" [ngClass]="{'bg-white/95': isScrolled}">
  <div class="container mx-auto px-6">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <a routerLink="/" class="text-2xl font-bold bg-gradient-to-r from-red-600 to-purple-600 bg-clip-text text-transparent hover:from-blue-700 hover:to-purple-700 transition-all duration-300">
        &lt;/ JP &gt;
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a routerLink="/" 
           routerLinkActive="text-blue-600" 
           [routerLinkActiveOptions]="{exact: true}"
           class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">
          Inicio
        </a>
        <a routerLink="/about" 
           routerLinkActive="text-blue-600" 
           class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">
          Sobre Mí
        </a>
        <a routerLink="/projects" 
           routerLinkActive="text-blue-600" 
           class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">
          Proyectos
        </a>
        <a routerLink="/skills" 
           routerLinkActive="text-blue-600" 
           class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">
          Habilidades
        </a>
        <a routerLink="/contact" 
           routerLinkActive="text-blue-600" 
           class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">
          Contacto
        </a>
      </div>

      <!-- CTA Button -->
      <div class="hidden md:block">
        <button (click)="downloadCV()" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white px-6 py-2 rounded-full font-medium transition-all duration-300 transform hover:scale-105 shadow-lg">
          Descargar CV
        </button>
      </div>

      <!-- Mobile Menu Button -->
      <div class="md:hidden">
        <button (click)="toggleMobileMenu()" 
                class="text-gray-700 hover:text-blue-600 focus:outline-none focus:text-blue-600 transition-colors duration-300">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path *ngIf="!isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            <path *ngIf="isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Navigation -->
    <div class="md:hidden" [class.hidden]="!isMobileMenuOpen">
      <div class="px-2 pt-2 pb-3 space-y-1 bg-white/95 backdrop-blur-md rounded-lg mt-2 shadow-lg">
        <a routerLink="/" 
           routerLinkActive="bg-blue-100 text-blue-600" 
           [routerLinkActiveOptions]="{exact: true}"
           (click)="closeMobileMenu()"
           class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-300">
          Inicio
        </a>
        <a routerLink="/about" 
           routerLinkActive="bg-blue-100 text-blue-600" 
           (click)="closeMobileMenu()"
           class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-300">
          Sobre Mí
        </a>
        <a routerLink="/projects" 
           routerLinkActive="bg-blue-100 text-blue-600" 
           (click)="closeMobileMenu()"
           class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-300">
          Proyectos
        </a>
        <a routerLink="/skills" 
           routerLinkActive="bg-blue-100 text-blue-600" 
           (click)="closeMobileMenu()"
           class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-300">
          Habilidades
        </a>
        <a routerLink="/contact" 
           routerLinkActive="bg-blue-100 text-blue-600" 
           (click)="closeMobileMenu()"
           class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-300">
          Contacto
        </a>
        <div class="px-3 py-2">
          <button (click)="downloadCV()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white px-6 py-2 rounded-full font-medium transition-all duration-300 transform hover:scale-105 shadow-lg">
            Descargar CV
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Spacer to prevent content from hiding behind fixed navbar -->
<div class="h-16"></div>
