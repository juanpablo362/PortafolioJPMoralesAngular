<nav class="fixed top-0 w-full z-50 transition-colors duration-300"
     [ngClass]="isScrolled ? 'bg-zinc-950/95 backdrop-blur-sm border-b border-zinc-700' : 'bg-transparent'">
  <div class="container mx-auto px-4 sm:px-6 max-w-6xl">
    <div class="flex items-center justify-between h-16">
      <a href="#hero" class="flex items-center">
        <img src="assets/Images/jplogo.png" alt="JP Logo" class="w-8 h-8 object-contain opacity-90">
      </a>

      <div class="hidden lg:flex items-center gap-1">
        <a *ngFor="let section of sections"
           [href]="'#' + section.id"
           class="nav-link"
           [class.nav-link-active]="isActive(section.id)">
          {{ section.label }}
        </a>
      </div>

      <div class="hidden lg:block">
        <button (click)="downloadCV()" class="btn-primary text-sm !py-2">
          Descargar CV
        </button>
      </div>

      <button (click)="toggleMobileMenu()"
              class="lg:hidden p-2 text-zinc-400 hover:text-white transition-colors"
              aria-label="Menú">
        <div class="w-5 h-5 flex flex-col justify-center items-center gap-1.5">
          <span class="w-5 h-px bg-current transition-all duration-300"
                [ngClass]="isMobileMenuOpen ? 'rotate-45 translate-y-[3.5px]' : ''"></span>
          <span class="w-5 h-px bg-current transition-all duration-300"
                [ngClass]="isMobileMenuOpen ? 'opacity-0' : ''"></span>
          <span class="w-5 h-px bg-current transition-all duration-300"
                [ngClass]="isMobileMenuOpen ? '-rotate-45 -translate-y-[3.5px]' : ''"></span>
        </div>
      </button>
    </div>

    <div class="lg:hidden overflow-hidden transition-all duration-300"
         [ngClass]="isMobileMenuOpen ? 'max-h-96 opacity-100 pb-4' : 'max-h-0 opacity-0'">
      <div class="flex flex-col gap-1 pt-2 border-t border-zinc-700">
        <a *ngFor="let section of sections"
           [href]="'#' + section.id"
           (click)="closeMobileMenu()"
           class="px-3 py-2.5 text-sm transition-colors"
           [ngClass]="isActive(section.id) ? 'text-white border-l-2 border-accent pl-2' : 'text-zinc-300 hover:text-white'">
          {{ section.label }}
        </a>
        <button (click)="downloadCV()" class="btn-primary w-full mt-2 text-sm">Descargar CV</button>
      </div>
    </div>
  </div>
</nav>

<div class="h-16"></div>
