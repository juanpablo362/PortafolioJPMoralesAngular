<nav class="fixed top-0 w-full z-50 transition-colors duration-300"
     [ngClass]="isScrolled ? 'bg-zinc-950/90 backdrop-blur-sm border-b border-zinc-800' : 'bg-transparent'">
  <div class="container mx-auto px-4 sm:px-6 max-w-6xl">
    <div class="flex items-center justify-between h-16">
      <a href="#hero" class="flex items-center">
        <img src="assets/Images/jplogo.png" alt="JP Logo" class="w-8 h-8 object-contain opacity-90">
      </a>

      <div class="hidden lg:flex items-center gap-1">
        <a href="#hero" class="px-3 py-2 text-sm text-zinc-400 hover:text-white transition-colors">Inicio</a>
        <a href="#projects" class="px-3 py-2 text-sm text-zinc-400 hover:text-white transition-colors">Proyectos</a>
        <a href="#about" class="px-3 py-2 text-sm text-zinc-400 hover:text-white transition-colors">Sobre mí</a>
        <a href="#skills" class="px-3 py-2 text-sm text-zinc-400 hover:text-white transition-colors">Habilidades</a>
        <a href="#contact" class="px-3 py-2 text-sm text-zinc-400 hover:text-white transition-colors">Contacto</a>
      </div>

      <div class="hidden lg:block">
        <button (click)="downloadCV()" class="btn-primary text-sm !py-2">
          Descargar CV
        </button>
      </div>

      <button (click)="toggleMobileMenu()"
              class="lg:hidden p-2 text-zinc-400 hover:text-white transition-colors"
              aria-label="Menú">
        <div class="w-5 h-5 flex flex-col justify-center items-center gap-1.5">
          <span class="w-5 h-px bg-current transition-all duration-300"
                [ngClass]="isMobileMenuOpen ? 'rotate-45 translate-y-[3.5px]' : ''"></span>
          <span class="w-5 h-px bg-current transition-all duration-300"
                [ngClass]="isMobileMenuOpen ? 'opacity-0' : ''"></span>
          <span class="w-5 h-px bg-current transition-all duration-300"
                [ngClass]="isMobileMenuOpen ? '-rotate-45 -translate-y-[3.5px]' : ''"></span>
        </div>
      </button>
    </div>

    <div class="lg:hidden overflow-hidden transition-all duration-300"
         [ngClass]="isMobileMenuOpen ? 'max-h-96 opacity-100 pb-4' : 'max-h-0 opacity-0'">
      <div class="flex flex-col gap-1 pt-2 border-t border-zinc-800">
        <a href="#hero" (click)="closeMobileMenu()" class="px-3 py-2.5 text-sm text-zinc-400 hover:text-white">Inicio</a>
        <a href="#projects" (click)="closeMobileMenu()" class="px-3 py-2.5 text-sm text-zinc-400 hover:text-white">Proyectos</a>
        <a href="#about" (click)="closeMobileMenu()" class="px-3 py-2.5 text-sm text-zinc-400 hover:text-white">Sobre mí</a>
        <a href="#skills" (click)="closeMobileMenu()" class="px-3 py-2.5 text-sm text-zinc-400 hover:text-white">Habilidades</a>
        <a href="#contact" (click)="closeMobileMenu()" class="px-3 py-2.5 text-sm text-zinc-400 hover:text-white">Contacto</a>
        <button (click)="downloadCV()" class="btn-primary w-full mt-2 text-sm">Descargar CV</button>
      </div>
    </div>
  </div>
</nav>

<div class="h-16"></div>
