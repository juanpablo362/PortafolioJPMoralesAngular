<div
  (click)="closeModal()"
  class="fixed inset-0 bg-black/80 flex justify-center items-center z-50 p-4 transition-opacity duration-200"
  [ngClass]="{'opacity-100': project, 'opacity-0 pointer-events-none': !project}">

  <div
    *ngIf="project"
    (click)="$event.stopPropagation()"
    class="relative w-full max-w-3xl max-h-[90vh] card overflow-hidden transition-all duration-200"
    [ngClass]="{'scale-100 opacity-100': project, 'scale-95 opacity-0': !project}">

    <button (click)="closeModal()"
            class="absolute top-4 right-4 text-zinc-500 hover:text-white transition-colors z-10"
            aria-label="Cerrar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <div class="overflow-y-auto max-h-[90vh]">
      <div class="h-52 sm:h-64 bg-zinc-800">
        <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover">
      </div>

      <div class="p-6 sm:p-8">
        <div class="flex flex-wrap items-center gap-2 mb-4">
          <span class="tag">{{ project.category }}</span>
          <span class="tag">{{ project.status }}</span>
          <span class="text-xs text-zinc-500 ml-auto">{{ project.year }}</span>
        </div>

        <h2 class="text-2xl sm:text-3xl font-semibold text-white mb-4 tracking-tight">
          {{ project.title }}
        </h2>

        <p class="text-zinc-400 text-sm sm:text-base leading-relaxed mb-6">
          {{ project.description }}
        </p>

        <div *ngIf="project.technologies?.length" class="mb-6">
          <h4 class="text-xs font-medium uppercase tracking-widest text-zinc-500 mb-3">Tecnologías</h4>
          <div class="flex flex-wrap gap-1.5">
            <span *ngFor="let tech of project.technologies" class="tag">{{ tech }}</span>
          </div>
        </div>

        <div class="mb-8">
          <h4 class="text-xs font-medium uppercase tracking-widest text-zinc-500 mb-3">Características</h4>
          <ul class="space-y-2">
            <li *ngFor="let feature of project.features" class="text-zinc-400 text-sm flex items-start gap-2">
              <span class="w-1 h-1 bg-zinc-500 rounded-full mt-2 shrink-0"></span>
              {{ feature }}
            </li>
          </ul>
        </div>

        <button (click)="openLink(project.github)" class="btn-primary w-full">
          Ver en GitHub
        </button>
      </div>
    </div>
  </div>
</div>
