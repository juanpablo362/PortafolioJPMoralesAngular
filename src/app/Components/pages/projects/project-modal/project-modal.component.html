<!-- Modal Backdrop -->
<div 
  (click)="closeModal()" 
  class="fixed inset-0 bg-black/70 backdrop-blur-sm flex justify-center items-center z-50 transition-opacity duration-300 p-4"
  [ngClass]="{'opacity-100': project, 'opacity-0 pointer-events-none': !project}">

  <!-- Modal Content -->
  <div 
    *ngIf="project" 
    (click)="$event.stopPropagation()"
    class="relative w-full max-w-4xl max-h-[90vh] bg-slate-900 border border-purple-500/50 rounded-2xl shadow-2xl shadow-purple-500/10 transform transition-all duration-300"
    [ngClass]="{'scale-100 opacity-100 translate-y-0': project, 'scale-95 opacity-0 -translate-y-10': !project}">
    
    <!-- Close Button -->
    <button (click)="closeModal()" class="absolute top-2 right-2 sm:top-4 sm:right-4 text-gray-400 hover:text-white transition-colors duration-300 z-10">
      <svg class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    
    <!-- Modal Body -->
    <div class="overflow-y-auto max-h-[90vh] rounded-2xl">
      <div class="grid grid-cols-1 lg:grid-cols-2">
        <!-- Left Side: Image and Meta -->
        <div class="p-4 sm:p-8 border-r border-slate-800">
          <!-- Project Image -->
          <div class="h-48 sm:h-64 bg-slate-800 rounded-lg overflow-hidden mb-4 sm:mb-6">
            <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover">
          </div>
          <div class="flex flex-wrap items-center gap-2 sm:gap-4 mb-4">
            <span [class]="getCategoryColor(project.category) + ' px-3 py-1.5 rounded-full text-xs sm:text-sm font-semibold text-white'">
              {{ project.category }}
            </span>
            <span [class]="getStatusColor(project.status) + ' px-3 py-1.5 rounded-full text-xs sm:text-sm font-semibold text-white'">
              {{ project.status }}
            </span>
          </div>
          <div class="text-center text-gray-400 text-xs sm:text-sm">
            Año de realización: {{ project.year }}
          </div>
        </div>

        <!-- Right Side: Details -->
        <div class="p-4 sm:p-8 flex flex-col">
          <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white mb-3 bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
            {{ project.title }}
          </h2>
          <p class="text-gray-300 text-sm sm:text-base mb-6 leading-relaxed flex-grow">
            {{ project.description }}
          </p>
          
          <div class="mb-6" *ngIf="project.technologies && project.technologies.length > 0">
            <h4 class="text-white font-semibold text-base sm:text-lg mb-3">Tecnologías Utilizadas:</h4>
            <div class="flex flex-wrap gap-2 sm:gap-3">
              <span *ngFor="let tech of project.technologies" class="px-2 sm:px-3 py-1 bg-slate-700 text-gray-200 text-xs sm:text-sm rounded-md">
                {{ tech }}
              </span>
            </div>
          </div>
          
          <div class="mb-6 sm:mb-8">
            <h4 class="text-white font-semibold text-base sm:text-lg mb-3">Características Principales:</h4>
            <ul class="space-y-2">
              <li *ngFor="let feature of project.features" class="text-gray-400 text-sm sm:text-base flex items-start">
                <span class="w-1.5 h-1.5 bg-purple-400 rounded-full mr-2 sm:mr-3 mt-2 flex-shrink-0"></span>
                <span>{{ feature }}</span>
              </li>
            </ul>
          </div>
          
          <!-- Action Buttons -->
          <div class="mt-auto">
            <button (click)="openLink(project.github)" class="w-full px-4 sm:px-6 py-3 bg-gradient-to-r from-purple-500 to-blue-500 text-white rounded-lg font-semibold hover:scale-105 transition-all duration-300 flex items-center justify-center gap-2 text-sm sm:text-base">
              <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
              </svg>
              Ver en GitHub
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
