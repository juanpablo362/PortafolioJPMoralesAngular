<div
  *ngIf="project"
  class="modal-root"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="project.title"
  (click)="closeModal()">

  <div class="modal-panel card" (click)="$event.stopPropagation()">
    <button
      (click)="closeModal()"
      class="modal-close"
      aria-label="Cerrar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <div class="modal-image">
      <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover">
    </div>

    <div class="modal-body">
      <div class="flex flex-wrap items-center gap-2 mb-4">
        <span class="tag">{{ project.category }}</span>
        <span class="tag">{{ project.status }}</span>
        <span class="text-xs text-zinc-400 ml-auto">{{ project.year }}</span>
      </div>

      <h2 class="font-display text-2xl sm:text-3xl font-semibold text-white mb-4 tracking-tight pr-8">
        {{ project.title }}
      </h2>

      <p class="text-zinc-300 text-sm sm:text-base leading-relaxed mb-6">
        {{ project.description }}
      </p>

      <div *ngIf="project.technologies?.length" class="mb-6">
        <h4 class="text-xs font-medium uppercase tracking-widest text-zinc-400 mb-3">Tecnologías</h4>
        <div class="flex flex-wrap gap-1.5">
          <span *ngFor="let tech of project.technologies" class="tag">{{ tech }}</span>
        </div>
      </div>

      <div class="mb-8">
        <h4 class="text-xs font-medium uppercase tracking-widest text-zinc-400 mb-3">Características</h4>
        <ul class="space-y-2">
          <li *ngFor="let feature of project.features" class="text-zinc-300 text-sm flex items-start gap-2">
            <span class="w-1 h-1 bg-zinc-500 rounded-full mt-2 shrink-0"></span>
            {{ feature }}
          </li>
        </ul>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <button
          *ngIf="project.demo"
          (click)="openLink(project.demo)"
          class="btn-primary flex-1">
          Ver demo
        </button>
        <button
          *ngIf="project.github"
          (click)="openLink(project.github)"
          [class]="project.demo ? 'btn-secondary flex-1' : 'btn-primary flex-1 w-full'">
          Ver en GitHub
        </button>
      </div>
    </div>
  </div>
</div>
