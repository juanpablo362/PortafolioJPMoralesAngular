<div>
  <div class="container mx-auto px-4 sm:px-6 max-w-6xl mb-14">
    <p class="section-label">Escríbeme</p>
    <h2 class="section-title mb-4">Contacto</h2>
    <p class="section-subtitle">
      ¿Tienes una pregunta o una propuesta? Estaré encantado de leerte.
    </p>
  </div>

  <div class="container mx-auto px-4 sm:px-6 max-w-xl">
    <form
      [formGroup]="contactForm"
      (ngSubmit)="sendEmail()"
      class="card p-6 sm:p-8 space-y-5">

      <div>
        <label for="from_name" class="block text-sm text-zinc-400 mb-1.5">Nombre</label>
        <input
          type="text"
          id="from_name"
          formControlName="from_name"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-md px-4 py-2.5 text-white text-sm focus:outline-none focus:border-zinc-600 transition-colors"
          [ngClass]="{ 'border-red-800': from_name?.invalid && from_name?.touched }">
        <p *ngIf="from_name?.invalid && from_name?.touched" class="text-red-400 text-xs mt-1.5">
          El nombre es requerido.
        </p>
      </div>

      <div>
        <label for="from_email" class="block text-sm text-zinc-400 mb-1.5">Email</label>
        <input
          type="email"
          id="from_email"
          formControlName="from_email"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-md px-4 py-2.5 text-white text-sm focus:outline-none focus:border-zinc-600 transition-colors"
          [ngClass]="{ 'border-red-800': from_email?.invalid && from_email?.touched }">
        <p *ngIf="from_email?.invalid && from_email?.touched" class="text-red-400 text-xs mt-1.5">
          <span *ngIf="from_email?.errors?.['required']">El email es requerido.</span>
          <span *ngIf="from_email?.errors?.['email']">Introduce un email válido.</span>
        </p>
      </div>

      <div>
        <label for="message" class="block text-sm text-zinc-400 mb-1.5">Mensaje</label>
        <textarea
          id="message"
          formControlName="message"
          rows="5"
          class="w-full bg-zinc-950 border border-zinc-800 rounded-md px-4 py-2.5 text-white text-sm focus:outline-none focus:border-zinc-600 transition-colors resize-none"
          [ngClass]="{ 'border-red-800': message?.invalid && message?.touched }"></textarea>
        <p *ngIf="message?.invalid && message?.touched" class="text-red-400 text-xs mt-1.5">
          El mensaje es requerido.
        </p>
      </div>

      <button
        type="submit"
        [disabled]="contactForm.invalid || isSending"
        class="btn-primary w-full disabled:opacity-40 disabled:cursor-not-allowed">
        <span *ngIf="!isSending">Enviar mensaje</span>
        <span *ngIf="isSending" class="flex items-center gap-2">
          <span class="w-4 h-4 border-2 border-zinc-950/30 border-t-zinc-950 rounded-full animate-spin"></span>
          Enviando...
        </span>
      </button>

      <p *ngIf="sendSuccess" class="text-sm text-emerald-400 text-center py-2 border border-emerald-900 bg-emerald-950 rounded-md">
        Mensaje enviado con éxito. Gracias por contactarme.
      </p>
      <p *ngIf="sendError" class="text-sm text-red-400 text-center py-2 border border-red-900 bg-red-950 rounded-md">
        {{ sendError }}
      </p>
    </form>
  </div>
</div>
