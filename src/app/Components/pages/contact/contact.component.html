<!-- Contact Page -->
<div class="min-h-screen">
  <!-- Header Section -->
  <section class="pt-32 pb-16 relative overflow-hidden">
    <div class="absolute inset-0">
      <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
      <div class="absolute top-0 -right-4 w-72 h-72 bg-yellow-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
      <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>
    
    <div class="container mx-auto px-6 relative z-10">
      <div class="text-center">
        <h1 class="text-6xl font-bold text-white mb-6">
          <span class="bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
            Contacto
          </span>
        </h1>
        <p class="text-xl text-gray-300 max-w-3xl mx-auto leading-relaxed">
          ¿Tienes una pregunta, una propuesta o simplemente quieres saludar? Contactame.
        </p>
      </div>
    </div>
  </section>

  <!-- Form Section -->
  <section class="pb-32">
    <div class="container mx-auto px-6">
      <div class="max-w-3xl mx-auto">
        <form 
          [formGroup]="contactForm" 
          (ngSubmit)="sendEmail()"
          class="bg-slate-800/50 backdrop-blur-sm border border-purple-500/30 rounded-2xl p-8 shadow-2xl shadow-purple-500/10 space-y-6">

          <!-- Name Input -->
          <div>
            <label for="from_name" class="block text-purple-300 font-semibold mb-2">Nombre</label>
            <input 
              type="text" 
              id="from_name" 
              formControlName="from_name"
              class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300"
              [ngClass]="{ 'border-red-500': from_name?.invalid && from_name?.touched }">
            <div *ngIf="from_name?.invalid && from_name?.touched" class="text-red-400 text-sm mt-2">
              <span *ngIf="from_name?.errors?.['required']">El nombre es requerido.</span>
            </div>
          </div>

          <!-- Email Input -->
          <div>
            <label for="from_email" class="block text-purple-300 font-semibold mb-2">Email</label>
            <input 
              type="email" 
              id="from_email" 
              formControlName="from_email"
              class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300"
              [ngClass]="{ 'border-red-500': from_email?.invalid && from_email?.touched }">
            <div *ngIf="from_email?.invalid && from_email?.touched" class="text-red-400 text-sm mt-2">
              <span *ngIf="from_email?.errors?.['required']">El email es requerido.</span>
              <span *ngIf="from_email?.errors?.['email']">Por favor, introduce un email válido.</span>
            </div>
          </div>

          <!-- Message Textarea -->
          <div>
            <label for="message" class="block text-purple-300 font-semibold mb-2">Mensaje</label>
            <textarea 
              id="message" 
              formControlName="message" 
              rows="6"
              class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300"
              [ngClass]="{ 'border-red-500': message?.invalid && message?.touched }"></textarea>
            <div *ngIf="message?.invalid && message?.touched" class="text-red-400 text-sm mt-2">
              <span *ngIf="message?.errors?.['required']">El mensaje es requerido.</span>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="text-center">
            <button 
              type="submit" 
              [disabled]="contactForm.invalid || isSending"
              class="w-full px-8 py-4 bg-gradient-to-r from-purple-500 to-blue-500 text-white font-bold rounded-lg hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100 transition-all duration-300 flex items-center justify-center">
              <span *ngIf="!isSending">Enviar Mensaje</span>
              <span *ngIf="isSending" class="flex items-center">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Enviando...
              </span>
            </button>
          </div>

          <!-- Status Messages -->
          <div *ngIf="sendSuccess" class="mt-4 text-center text-green-400 bg-green-900/50 border border-green-500 rounded-lg p-3">
            ¡Mensaje enviado con éxito! Gracias por contactarme.
          </div>
          <div *ngIf="sendError" class="mt-4 text-center text-red-400 bg-red-900/50 border border-red-500 rounded-lg p-3">
            {{ sendError }}
          </div>
        </form>
      </div>
    </div>
  </section>
</div>
