<section class="relative min-h-[calc(100vh-4rem)] flex items-center section-fade-in overflow-hidden">
  <div class="hero-glow absolute inset-0 pointer-events-none" aria-hidden="true"></div>

  <ng-container *ngIf="isLoading">
    <div class="container mx-auto px-4 sm:px-6 max-w-6xl flex justify-center items-center min-h-[60vh]">
      <div class="w-8 h-8 border-2 border-zinc-700 border-t-accent rounded-full animate-spin"></div>
    </div>
  </ng-container>

  <ng-container *ngIf="error">
    <div class="container mx-auto px-4 sm:px-6 max-w-6xl flex justify-center items-center min-h-[60vh] text-center">
      <div>
        <p class="text-zinc-400 mb-4">{{ error }}</p>
        <button (click)="loadPersonalInfo()" class="btn-primary">Reintentar</button>
      </div>
    </div>
  </ng-container>

  <div *ngIf="!isLoading && !error && personalInfo" class="relative container mx-auto px-4 sm:px-6 max-w-6xl py-16 sm:py-24">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">

      <div class="order-2 lg:order-1">
        <p class="section-label">
          <span class="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>
          Disponible · {{ personalInfo.location }}
        </p>

        <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl font-semibold tracking-tight mb-4 leading-[1.1]">
          <span class="block text-zinc-400 text-xl sm:text-2xl font-normal mb-2">Hola, soy</span>
          <span class="text-zinc-50">{{ personalInfo.name }}</span>
        </h1>

        <p class="text-lg text-zinc-200 mb-4 font-medium">
          {{ personalInfo.title }}
        </p>

        <div *ngIf="personalInfo.highlightStack?.length" class="flex flex-wrap gap-2 mb-5">
          <span *ngFor="let tech of personalInfo.highlightStack; let last = last" class="stack-pill">
            {{ tech }}<span *ngIf="!last" class="hidden"></span>
          </span>
        </div>

        <p class="text-zinc-300 text-sm sm:text-base max-w-lg mb-8 leading-relaxed">
          {{ personalInfo.bio }}
        </p>

        <div class="flex flex-wrap gap-3 mb-8">
          <span class="stat-pill"><strong>{{ projectCount }}</strong> proyectos</span>
          <span class="stat-pill"><strong>Scrum</strong> · equipo ágil</span>
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <a href="#projects" class="btn-primary">Ver proyectos</a>
          <a href="#contact" class="btn-secondary">Contactar</a>
        </div>
      </div>

      <div class="flex justify-center lg:justify-end order-1 lg:order-2">
        <div class="flex flex-col items-center gap-6">
          <div class="hero-photo-ring w-44 h-44 sm:w-52 sm:h-52 rounded-full bg-zinc-900 border-2 border-accent-muted flex items-center justify-center overflow-hidden shrink-0">
            <img
              *ngIf="personalInfo.avatar"
              [src]="personalInfo.avatar"
              [alt]="'Foto de ' + personalInfo.name"
              class="w-full h-full object-cover object-top">
            <span *ngIf="!personalInfo.avatar" class="text-3xl font-semibold text-white font-display">
              {{ getInitials(personalInfo.name) }}
            </span>
          </div>
          <button (click)="downloadCV()" class="btn-secondary text-sm min-w-[180px]">
            Descargar CV
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
